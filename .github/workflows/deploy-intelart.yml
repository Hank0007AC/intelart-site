name: Deploy Intelart to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /docker/intelart-src
            git fetch origin main
            git reset --hard origin/main

            mkdir -p /docker/intelart/app
            find /docker/intelart/app -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar --exclude=.git --exclude=.github -cf - . | tar -C /docker/intelart/app -xf -

            mkdir -p /docker/intelart/app/config
            cat > /docker/intelart/app/config/database.php <<'PHP'
            <?php
            return [
                'host' => 'db',
                'port' => '3306',
                'dbname' => 'intelart_db',
                'username' => 'intelart_user',
                'password' => getenv('MYSQL_PASSWORD') ?: '',
                'charset' => 'utf8mb4',
                'options' => [
                    PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                    PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                    PDO::ATTR_EMULATE_PREPARES => false,
                ],
            ];
            PHP

            set -a
            . /docker/intelart/.env
            set +a

            cd /docker/intelart
            docker compose up -d --build

            if [ -f /docker/intelart/app/sql/schema.sql ]; then
              docker exec -i intelart-db-1 mariadb -u root -p"${MYSQL_ROOT_PASSWORD}" intelart_db < /docker/intelart/app/sql/schema.sql
            fi
