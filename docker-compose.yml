services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - ./app:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`intelart.ca`) || Host(`www.intelart.ca`) || Host(`intelart.ca`) || Host(`www.intelart.ca`) || Host(`${COMPOSE_PROJECT_NAME}.${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./app:/var/www/html
      - ./msmtprc:/etc/msmtprc:ro

  db:
    image: mariadb:11
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db_data:/var/lib/mysql
